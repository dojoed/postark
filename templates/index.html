<!-- ONLY showing the NEW part added to your existing file -->

{% if result and not result.error %}
<div class="results">

    <div class="images">
        {% if front_path %}
            <a href="{{ front_path }}" target="_blank">
                <img src="{{ front_path }}">
            </a>
        {% endif %}

        {% if back_path %}
            <a href="{{ back_path }}" target="_blank">
                <img src="{{ back_path }}">
            </a>
        {% endif %}
    </div>

    <div class="section">
        <h3>Overview</h3>
        <p>{{ result.overview }}</p>
    </div>

    <div class="section">
        <h3>Analysis</h3>
        <p>{{ result.analysis }}</p>
    </div>

    <div class="section">
        <h3>Story</h3>
        <p>{{ result.story }}</p>
    </div>

    <div class="section">
        <h3>Timeline</h3>
        <p>{{ result.timeline }}</p>
    </div>

    <!-- PDF DOWNLOAD -->
    <form method="POST" action="/download_pdf">
        <input type="hidden" name="data" value='{{ result | tojson | safe }}'>
        <input type="hidden" name="front_path" value="{{ front_path }}">
        <input type="hidden" name="back_path" value="{{ back_path }}">
        <button type="submit">Download PDF</button>
    </form>

</div>
{% endif %}
